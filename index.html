<!DOCTYPE html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>OpenScribe · AI 회의록 자동화</title>

    <!-- Apply persisted theme before first paint (no FOUC) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('openscribe-theme'); // 'light' | 'dark' | 'system'
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = stored === 'dark' || (stored !== 'light' && prefersDark) ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {}
      })();
    </script>

    <!-- Pretendard (본문/UI) + JetBrains Mono (타임스탬프/수치) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
